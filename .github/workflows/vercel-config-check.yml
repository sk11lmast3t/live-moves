name: Validate Vercel Config

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-vercel-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate vercel.json
        run: node scripts/validate-vercel-config.mjs
